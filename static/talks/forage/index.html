# Characteristics

![Illustration of climax vegetations & position of forest garden by wild wood](https://res.cloudinary.com/growdigital/image/upload/w_784/v1575064970/climax-vegetation.png)

1. Sustainable 
2. Productive
3. Wildlife friendly
4. Layers
5. Perennial

<h6 class="breadcrumb">Agency — <span class="u-underline">Forest Garden</span> — Foraging — Edible crops — Community — Practical steps</h6>

???

* Illustration of forest garden in “climax vegetation”
* The further right you go, the more energy, less diversity, more fragility
* Illustration from Martin Crawford’s Creating a Forest Gard
