# explain how you feel that you would fit into our team and what you could bring.

1. fit into team
2. what you could bring

> committed to sustainable development, protecting and improving the local environment and want to join a team dedicated to creating and maintaining a beautiful Wales

> diverse team of people who share our passion and have the energy and skills to help us achieve our aim to be representative of all of the communities we work in.

> [Local Places for Nature Scheme](https://keepwalestidy.cymru/our-work/conservation/nature/)

## Beautiful Wales decade strategy, promises

* Eradicate litter and waste
* Set standards for environmental quality
* Create and restore green spaces
* Empower young people

# Key tasks

1. Support successful Local Places for Nature applicants to construct their nature spaces
2. Promote the Local Places for Nature programme on social media
3. Encourage and support more Local Places for Nature applications
4. Assist community groups and applicants to become constituted and apply
5. Undertake all administrative task
6. Ensure all activities follow safe-working practices
7. Deliver other specific practical, environmental projects
8. Undertake any other reasonable task

# Person specification

* demonstrate that you have a knowledge of environmental and sustainable development and have a passion for working in this area.

wildlife and forest garden design

* show us that you have had success in volunteer engagement and supervision and in community development as well as
experience of constructing food growing areas and wildlife garden

primary school, cadernid emlyn resilience, the people's orchard project, all my portfolio

* The role will require the delivery of practical events, some of which will be with schoolchildren, so proven experience in organising and
supervising events and an interest in working with children will be essential.

primary school

## skills

manage projects, 
work with others
practical skills
proficient at MS office
innovative approach
driving license
Welsh learner, would like extra training 

There are some skills that you will need to demonstrate that you have, and these include:
• The ability to prioritise, plan and manage a varied workload to meet demanding deadlines.
• The ability to build effective relationships with staff, managements, key individuals and organisations at all levels.
• Have a high level of self-motivation and the ability to work effectively with minimal supervision and as part of a team.
• Possess and demonstrate a range of practical countryside skills.
• Proficient in the use of Microsoft Office applications.
• Be a flexible team player with a collaborative working ethos who recognises the benefits of partnership working.
• Be willing to work flexible hours, including occasional weekends and evenings to support some volunteer activities.
• Have an innovative approach and be prepared to try out new methods and ideas.
• Be highly self-motivated with excellent time management and organisational skills.
• Be willing to travel across Wales as required.

* It would be great if you could communicate through the medium of Welsh, but this is desirable, not essential.
