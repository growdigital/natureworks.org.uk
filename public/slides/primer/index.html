# What can I do?

![Photo of young forest garden](https://res.cloudinary.com/growdigital/image/upload/w_390/v1589616717/comfrey-904711.jpg)

* Grow edible crops with nature
* Native plants where possible
* Create wildlife habitat
* Wildlife allotments

???

Also, 

* Governance by [Community Assemblies](https://rebeltoolkit.extinctionrebellion.uk/books/trust-the-people-workshops/chapter/4-community-assemblies)
* Decommodify food 
* Become an activist!

"changes in land use arising from a push to increase yields as much as possible so as to maximise profit margins… capitalism is the cause of the Yellowhammer’s decline"

~ [Jonathan Dean](https://jmdean1982.medium.com/time-to-get-angry-beyond-the-cosy-consensus-in-british-nature-conservation-a833ee0fd7ec)
